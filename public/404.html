<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Duri</title>
  <script>
    // SPA redirect for GitHub Pages — redirects all 404s to index.html with the path preserved
    var path = window.location.pathname;
    var search = window.location.search;
    window.location.replace(window.location.origin + '/?p=' + encodeURIComponent(path + search));
  </script>
</head>
<body></body>
</html>
